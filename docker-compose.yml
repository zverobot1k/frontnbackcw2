services:
  db:
    image: postgres:16-alpine
    container_name: web-postgres
    environment:
      POSTGRES_DB: webdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: dockerfile
    container_name: web-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: webdb
      DB_SSLMODE: disable
      JWT_SECRET: dev_secret
    ports:
      - "8080:8080"

  frontend:
    image: node:20-alpine
    container_name: web-frontend
    working_dir: /app
    depends_on:
      api:
        condition: service_started
    environment:
      VITE_PROXY_TARGET: http://api:8080
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
